server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 1) Long-cache only for hashed assets (Vite emits hashed names)
  location ~* /assets/.*[-_][A-Za-z0-9]{8,}\.(?:css|js|mjs|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # 2) Moderate cache for other static files (e.g. things copied from /public without hashing)
  location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    try_files $uri =404;
  }

  # 3) Never cache the HTML shell
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # 4) Service worker: also no aggressive cache
  location = /sw.js {
    expires -1;
    add_header Cache-Control "no-cache" always;
  }

  # 5) SPA fallback for *all* routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}